name: Java CI with Maven and Checkstyle

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Este comando compila, pasa los tests de JUnit y ejecuta Checkstyle 
    - name: Build and Run Checkstyle
      run: mvn -B package checkstyle:check --file pom.xml
